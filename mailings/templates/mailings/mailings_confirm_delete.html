<!-- mailings_confirm_delete.html -->
{% extends 'mailings/base.html' %}

{% block title %}Удалить рассылку{% endblock %}

{% block content %}
<h2>Удалить рассылку</h2>
<p>Вы уверены, что хотите удалить рассылку?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'mailings:mailings_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
